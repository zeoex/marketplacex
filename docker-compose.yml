version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mpx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mpx_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mpx_password}
      POSTGRES_DB: ${DB_NAME:-marketplacex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    networks:
      - mpx_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-mpx_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mpx_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mpx_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - mpx_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mpx_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mpx_network
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: mpx_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - mpx_network

  nginx:
    image: nginx:alpine
    container_name: mpx_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mpx_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  mpx_network:
    driver: bridge
